name: Verify

# Temporary kill-switch to cancel hung Verify runs from the broken previous version
# of this workflow. Will be deleted immediately after running successfully.

on:
  push:
  workflow_dispatch:

concurrency:
  group: verify
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "kill-switch fired; previous hung runs in this concurrency group are cancelled"
