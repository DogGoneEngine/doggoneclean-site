name: Deploy staging

# Builds the Astro site and publishes it to the shared dog-gone-engine droplet,
# where Caddy serves it at hurricanebath.com from /srv/doggoneclean.
# Triggers on the active working branch for now; when doggoneclean.us (production)
# is wired, main will deploy there and this staging trigger gets cleaned up.
#
# The deploy is GATED on the audit: the `deploy` job `needs` the `audit` job, so
# a push to main that fails scripts/check.py never reaches the rsync step and
# never publishes. "Shipped" therefore cannot mean "reached the live site
# broken" - the gate runs the same check that powers the pre-commit hook and CI.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/check.py

  deploy:
    needs: audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --omit=dev

      - run: npm run build

      - name: Publish dist to the droplet
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 178.128.144.219 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" dist/ cleandeploy@178.128.144.219:/srv/doggoneclean/
