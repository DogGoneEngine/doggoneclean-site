<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Prometheus, nothing staged</title>
<style>
  :root { color-scheme: dark; --gold: #d9b46a; --blue: #39a0ff; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px; text-align: center;
    color: #e8ebf2; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(120% 80% at 50% 22%, rgba(30,58,110,0.55), rgba(13,20,38,0) 60%),
      #0b1120;
    overflow-x: hidden;
  }
  .statue {
    width: min(72vw, 300px); height: auto; display: block;
    filter: drop-shadow(0 18px 60px rgba(57,160,255,0.40));
    margin-bottom: 8px;
  }
  .tag {
    display: inline-block; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); border: 1px solid rgba(217,180,106,0.5); border-radius: 999px;
    padding: 4px 12px; margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(24px, 7vw, 34px); line-height: 1.15; margin: 0 0 12px; font-weight: 800;
    background: linear-gradient(90deg, #ffffff, var(--blue) 165%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p { font-size: 15px; line-height: 1.6; color: #b9c0d4; margin: 0 0 26px; max-width: 42ch; }
  a.go {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; color: #0b1120; text-decoration: none;
    background: linear-gradient(180deg, #f0d9a8, var(--gold));
    border-radius: 999px; padding: 11px 20px;
    box-shadow: 0 8px 24px rgba(217,180,106,0.28);
  }
</style>
</head>
<body>
  <img class="statue" src="/preview/prometheus.png" alt="Prometheus raising the stolen fire" />
  <div class="tag">Prometheus</div>
  <h1>Nothing is staged right now</h1>
  <p>The latest changes are already live. When Claude builds something new for you to review, it shows up here, wearing the red preview banner, before it goes live.</p>
  <a class="go" href="https://hurricanebath.com/laelaps">Open the live Laelaps <span>&rarr;</span></a>
</body>
</html>
